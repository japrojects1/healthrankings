services:
  - type: web
    name: healthrankings-web
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run copy:static && npm run build:web
    startCommand: npm run start:web
    envVars:
      # Ensure devDependencies are installed during build (Next needs TypeScript tooling).
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NODE_VERSION
        value: "22"
      # Set this after the CMS is deployed (example: https://healthrankings-cms.onrender.com)
      - key: STRAPI_URL
        sync: false
    # Attach `healthrankings.co` after the service is created (it is currently in use).

  - type: web
    name: healthrankings-cms
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm --workspace apps/cms rebuild @swc/core || true && npm --workspace apps/cms run build
    startCommand: npm --workspace apps/cms run start
    envVars:
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NPM_CONFIG_OPTIONAL
        value: "true"
      - key: NPM_CONFIG_IGNORE_SCRIPTS
        value: "false"
      - key: NODE_VERSION
        value: "22"
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: healthrankings-db
          property: connectionString
    # Attach `cms.healthrankings.co` after the service is created.

databases:
  - name: healthrankings-db
    # Render no longer supports legacy `starter` Postgres for *new* databases.
    # Use a current Postgres instance type (legacy types like starter/standard/pro are not allowed for new DBs).
    plan: basic-1gb
